<!DOCTYPE html>
<html>
<head>
<title>PurePick Login Test</title>
</head>
<body style="font-family:Arial;padding:40px;background:#f5f5f5;">

<h2>🔐 PurePick - Login Test</h2>
<p style="color:#666;">Upload this to kdj.lk and test if login works.</p>

<div style="background:white;padding:30px;border-radius:12px;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.1);">
  <input type="text" id="u" placeholder="Username" value="oshan"
    style="width:100%;padding:12px;margin-bottom:12px;border:2px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box;">
  <input type="password" id="p" placeholder="Password" value="oshan5555"
    style="width:100%;padding:12px;margin-bottom:12px;border:2px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box;">
  <button id="loginbtn"
    style="width:100%;padding:14px;background:#1a5e2a;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;">
    LOGIN →
  </button>
  <div id="msg" style="margin-top:12px;font-weight:bold;font-size:15px;"></div>
</div>

<div id="dash" style="display:none;margin-top:30px;background:#1a5e2a;color:white;padding:30px;border-radius:12px;max-width:600px;">
  <h2>✅ DASHBOARD WORKS!</h2>
  <p id="dinfo" style="margin-top:10px;font-size:16px;"></p>
  <p style="margin-top:8px;opacity:0.8;">The login system is working correctly on this hosting.</p>
  <button onclick="document.getElementById('dash').style.display='none';document.getElementById('msg').textContent='';"
    style="margin-top:15px;padding:10px 20px;background:white;color:#1a5e2a;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">
    Logout
  </button>
</div>

<script>
document.getElementById('loginbtn').onclick = function() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  var msg = document.getElementById('msg');

  if (u === 'oshan' && p === 'oshan5555') {
    msg.style.color = 'green';
    msg.textContent = '✅ Correct! Opening dashboard...';
    document.getElementById('dash').style.display = 'block';
    document.getElementById('dinfo').textContent = 'Logged in as: ' + u + ' | Role: MAIN ADMIN';
  } else {
    msg.style.color = 'red';
    msg.textContent = '❌ Wrong. Use username: oshan and password: oshan5555';
  }
};

document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') document.getElementById('loginbtn').click();
});
</script>

</body>
</html>
